name: Release

# Publishes ONLY on a version tag. Pushing to main never publishes (that's ci.yml,
# which just builds + tests). Release = manually create + push a v* tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r test

      # ---- npm (core first, then cli) ----
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm --filter cardinal-core publish --no-git-checks --access public
      - run: pnpm --filter cardinal-cli publish --no-git-checks --access public

      # ---- package the extension once, publish to both registries ----
      - name: Package extension
        working-directory: packages/vscode
        run: npx @vscode/vsce package --no-dependencies -o cardinal.vsix

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode
        run: npx @vscode/vsce publish --no-dependencies --packagePath cardinal.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        working-directory: packages/vscode
        run: npx ovsx publish cardinal.vsix -p "${{ secrets.OVSX_TOKEN }}"

      # ---- GitHub Release with the vsix attached ----
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create "${GITHUB_REF_NAME}" packages/vscode/cardinal.vsix --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
